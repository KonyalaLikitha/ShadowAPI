<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h2>ShadowAPI Control Panel</h2>

    <div class="header-controls">
      <div class="mode-badge" id="modeBadge"></div>
      <button id="toggle" class="btn btn-primary"></button>
      <button id="clear" class="btn btn-secondary">Clear Logs</button>
    </div>
  </div>

  <div class="stats">
    <span>Total Requests: <span id="requestCount">0</span></span>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Filter requests..." />
  </div>

  <div id="logs"></div>

  <script src="panel.js"></script>
</body>
</html>
